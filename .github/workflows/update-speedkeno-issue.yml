name: SpeedKeno Recommend (Issue Comment)

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  issues: write

concurrency:
  group: issue-speedkeno
  cancel-in-progress: true

jobs:
  recommend:
    if: |
      github.event.issue.pull_request == null &&
      contains(github.event.comment.body, '/speedkeno') &&
      github.actor != 'github-actions[bot]'

    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build recommendation markdown
        id: rec
        env:
          SPEEDKENO_COMMAND: ${{ github.event.comment.body }}
        run: |
          node scripts/update_speedkeno.mjs --recommend > /tmp/rec.md
          echo "md<<EOF" >> $GITHUB_OUTPUT
          cat /tmp/rec.md >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Comment back
        uses: actions/github-script@v7
        env:
          BODY: ${{ steps.rec.outputs.md }}
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: process.env.BODY
            });
